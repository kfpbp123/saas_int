<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mine Bot Management</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --sculk-dark: #0d1117;
            --sculk-glow: #00fbff;
            --sculk-secondary: #161b22;
            --sculk-text: #e6edf3;
            --sculk-hint: #7d8590;
        }
        body {
            background-color: var(--sculk-dark);
            color: var(--sculk-text);
            background-image: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
        }
        .card {
            background-color: var(--sculk-secondary);
            border: 1px solid rgba(0, 251, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: border 0.3s ease;
        }
        .card:hover {
            border-color: rgba(0, 251, 255, 0.4);
        }
        .btn-primary {
            background-color: var(--sculk-glow);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 251, 255, 0.3);
        }
        .text-hint {
            color: var(--sculk-hint);
        }
        .glow-text {
            color: var(--sculk-glow);
            text-shadow: 0 0 10px rgba(0, 251, 255, 0.5);
        }
        /* Анимация сердца Вардена */
        @keyframes warden-pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(0, 251, 255, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 251, 255, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(0, 251, 255, 0.4); }
        }
        .btn-publish {
            background: linear-gradient(135deg, #00fbff 0%, #008f91 100%);
            color: #000;
            animation: warden-pulse 2s infinite ease-in-out;
        }
        input, textarea {
            background-color: #0d1117 !important;
            color: white !important;
            border: 1px solid #30363d !important;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- Dashboard -->
        <header class="mb-10">
            <h1 class="text-4xl font-black mb-8 glow-text tracking-tighter">MINE STUDIO</h1>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="card p-6 flex flex-col items-center justify-center border-l-4 border-l-[#00fbff]">
                    <span class="text-hint text-xs uppercase tracking-[0.2em] mb-2">Queue</span>
                    <span id="stat-queue" class="text-4xl font-black text-[#00fbff]">0</span>
                </div>
                <div class="card p-6 flex flex-col items-center justify-center">
                    <span class="text-hint text-xs uppercase tracking-[0.2em] mb-2">Today</span>
                    <span id="stat-today" class="text-4xl font-black text-[#00fbff]">0</span>
                </div>
                <div class="card p-6 flex flex-col items-center justify-center">
                    <span class="text-hint text-xs uppercase tracking-[0.2em] mb-2">Total</span>
                    <span id="stat-total" class="text-4xl font-black opacity-30">0</span>
                </div>
                <div class="card p-6 flex flex-col items-center justify-center">
                    <span class="text-hint text-xs uppercase tracking-[0.2em] mb-2">Channels</span>
                    <span id="stat-channels" class="text-4xl font-black opacity-30">0</span>
                </div>
            </div>
        </header>

        <!-- Queue Section -->
        <section>
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold tracking-tight">Content Pipeline</h2>
                <button onclick="fetchData()" class="bg-[#161b22] p-3 rounded-xl text-[#00fbff] border border-[#30363d] hover:bg-[#30363d] transition-all">
                    <i data-lucide="refresh-cw" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="queue-list" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Posts will be here -->
            </div>
        </section>
    </div>

    <!-- Edit Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="card w-full max-w-2xl p-8 border-[#00fbff]/30">
            <h3 class="text-2xl font-bold mb-6 glow-text">Modify Content</h3>
            <textarea id="edit-text" class="w-full h-64 p-4 rounded-xl mb-6 outline-none focus:border-[#00fbff] transition-all" placeholder="Enter sculk signals..."></textarea>
            <div class="flex space-x-4">
                <button onclick="saveEdit()" class="btn-primary flex-1 py-4 rounded-xl font-bold uppercase tracking-widest hover:brightness-110 transition-all">Save Essence</button>
                <button onclick="closeModal()" class="bg-transparent text-hint border border-[#30363d] flex-1 py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-[#30363d] transition-all">Discard</button>
            </div>
        </div>
    </div>

    <script>
        // ... (скрипт остается прежним, обновляем только функцию рендера)
        function renderQueue(posts) {
            const list = document.getElementById('queue-list');
            if (posts.length === 0) {
                list.innerHTML = '<div class="col-span-full text-hint text-center py-20 bg-[#161b22] rounded-3xl border border-dashed border-[#30363d]">The void is empty...</div>';
                return;
            }

            list.innerHTML = posts.map(post => {
                const date = new Date(post.scheduled_time * 1000).toLocaleString('ru-RU', {
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                });
                
                let attachmentsHtml = '';
                if (post.photo_id) {
                    const isAlbum = post.photo_id.includes(',');
                    attachmentsHtml += `
                        <div class="bg-[#00fbff]/10 text-[#00fbff] p-3 rounded-xl flex items-center mb-4 border border-[#00fbff]/20">
                            <i data-lucide="${isAlbum ? 'layers' : 'image'}" class="w-5 h-5 mr-2"></i>
                            <span class="text-xs font-bold uppercase tracking-wider">${isAlbum ? 'Visual Album' : 'Visual Data'}</span>
                        </div>
                    `;
                }
                if (post.document_id) {
                    attachmentsHtml += `
                        <div class="bg-amber-500/10 text-amber-500 p-3 rounded-xl flex items-center mb-4 border border-amber-500/20">
                            <i data-lucide="file-text" class="w-5 h-5 mr-2"></i>
                            <span class="text-xs font-bold uppercase tracking-wider">Ancient File</span>
                        </div>
                    `;
                }

                return `
                    <div class="card overflow-hidden flex flex-col border-[#30363d]">
                        <!-- Post Header -->
                        <div class="p-4 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117]/50">
                            <div class="flex items-center">
                                <div class="w-2 h-2 rounded-full bg-[#00fbff] mr-2 shadow-[0_0_8px_#00fbff]"></div>
                                <span class="text-[10px] font-black uppercase tracking-widest text-[#00fbff] opacity-80">${post.channel}</span>
                            </div>
                            <span class="text-[10px] font-mono text-hint bg-[#161b22] px-2 py-1 rounded border border-[#30363d]">${date}</span>
                        </div>

                        <!-- Post Body -->
                        <div class="p-6 flex-1">
                            ${attachmentsHtml}
                            <div class="text-sm whitespace-pre-wrap leading-relaxed opacity-90 mb-4 font-sans text-gray-300">
                                ${post.text.replace(/<[^>]*>?/gm, '')}
                            </div>
                        </div>

                        <!-- Post Footer (Actions) -->
                        <div class="p-4 bg-[#0d1117]/50 border-t border-[#30363d] flex space-x-3">
                            <button onclick="openEdit(${post.id}, \`${post.text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" 
                                    class="flex-1 bg-[#161b22] border border-[#30363d] text-[#e6edf3] py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-[#30363d] transition-all">
                                Edit
                            </button>
                            <button onclick="publishNow(${post.id})" 
                                    class="flex-1 btn-publish py-3 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg transition-all">
                                Publish
                            </button>
                            <button onclick="deletePost(${post.id})" 
                                    class="w-12 flex items-center justify-center bg-[#161b22] border border-red-900/30 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function openEdit(id, text) {
            currentPostId = id;
            document.getElementById('edit-text').value = text;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function saveEdit() {
            const newText = document.getElementById('edit-text').value;
            await fetch(`${API_URL}/api/queue/${currentPostId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: newText})
            });
            closeModal();
            fetchData();
        }

        async function deletePost(id) {
            if (!confirm('Delete this post?')) return;
            await fetch(`${API_URL}/api/queue/${id}`, {method: 'DELETE'});
            fetchData();
        }

        async function publishNow(id) {
            tg.MainButton.setText('Publishing...');
            tg.MainButton.show();
            await fetch(`${API_URL}/api/queue/${id}/publish`, {method: 'POST'});
            tg.MainButton.hide();
            fetchData();
        }

        window.onload = () => {
            fetchData();
            lucide.createIcons();
        };
    </script>
</body>
</html>
