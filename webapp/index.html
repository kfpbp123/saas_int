<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mine Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --sculk-dark: #0d1117;
            --sculk-glow: #00fbff;
            --sculk-secondary: #161b22;
            --sculk-text: #e6edf3;
            --sculk-hint: #7d8590;
        }
        body {
            background-color: var(--sculk-dark);
            color: var(--sculk-text);
            background-image: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        .card {
            background-color: var(--sculk-secondary);
            border: 1px solid rgba(0, 251, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            border-color: rgba(0, 251, 255, 0.4);
            transform: translateY(-4px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #00fbff 0%, #008f91 100%);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 251, 255, 0.3);
        }
        .glow-text {
            color: var(--sculk-glow);
            text-shadow: 0 0 15px rgba(0, 251, 255, 0.6);
        }
        @keyframes warden-pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(0, 251, 255, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 25px rgba(0, 251, 255, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(0, 251, 255, 0.4); }
        }
        .btn-publish { animation: warden-pulse 2s infinite ease-in-out; }
        .tab-active {
            color: var(--sculk-glow);
            border-bottom: 3px solid var(--sculk-glow);
        }
        textarea {
            background-color: #0d1117 !important;
            color: white !important;
            border: 1px solid #30363d !important;
        }
        .hidden-section { display: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 pb-24">
    <div id="app" class="max-w-5xl mx-auto">
        <!-- Navigation -->
        <nav class="flex justify-start md:justify-around mb-10 bg-black/30 backdrop-blur-md sticky top-0 z-40 p-2 rounded-2xl border border-white/5 overflow-x-auto nav-scroll">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] tab-active transition-all whitespace-nowrap">Studio</button>
            <button onclick="switchTab('ai')" id="tab-ai" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] text-hint transition-all whitespace-nowrap">AI Insights</button>
            <button onclick="switchTab('trends')" id="tab-trends" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] text-hint transition-all whitespace-nowrap">Web Trends</button>
            <button onclick="switchTab('channels')" id="tab-channels" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] text-hint transition-all whitespace-nowrap">Network</button>
        </nav>

        <!-- DASHBOARD SECTION -->
        <div id="section-dashboard">
            <header class="mb-12">
                <h1 class="text-5xl font-black mb-10 glow-text tracking-tighter uppercase italic">MINE STUDIO</h1>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8">
                    <div class="card p-6 flex flex-col items-center justify-center border-t-2 border-t-[#00fbff]">
                        <span class="text-hint text-[10px] uppercase tracking-[0.3em] mb-2">Queue</span>
                        <span id="stat-queue" class="text-4xl font-black text-[#00fbff]">0</span>
                    </div>
                    <div class="card p-6 flex flex-col items-center justify-center border-t-2 border-t-[#00fbff]">
                        <span class="text-hint text-[10px] uppercase tracking-[0.3em] mb-2">Today</span>
                        <span id="stat-today" class="text-4xl font-black text-[#00fbff]">0</span>
                    </div>
                    <div class="card p-6 flex flex-col items-center justify-center border-t-2 border-t-white/10">
                        <span class="text-hint text-[10px] uppercase tracking-[0.3em] mb-2">Total</span>
                        <span id="stat-total" class="text-4xl font-black opacity-30">0</span>
                    </div>
                    <div class="card p-6 flex flex-col items-center justify-center border-t-2 border-t-white/10">
                        <span class="text-hint text-[10px] uppercase tracking-[0.3em] mb-2">Active</span>
                        <span id="stat-channels" class="text-4xl font-black opacity-30">0</span>
                    </div>
                </div>
            </header>

            <section>
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black tracking-tighter uppercase italic opacity-80 underline decoration-[#00fbff]/30">Content Pipeline</h2>
                    <button onclick="fetchData()" class="bg-[#161b22] p-4 rounded-2xl text-[#00fbff] border border-[#30363d] shadow-lg active:scale-95 transition-all">
                        <i data-lucide="refresh-cw" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="queue-list" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Posts -->
                </div>
            </section>
        </div>

        <!-- AI SECTION -->
        <div id="section-ai" class="hidden-section">
            <h2 class="text-4xl font-black mb-10 glow-text tracking-tighter uppercase italic">AI Deep Analysis</h2>
            <div class="card p-8 min-h-[400px] flex flex-col">
                <div id="ai-report" class="flex-1 text-sm whitespace-pre-wrap leading-relaxed font-sans text-gray-300 italic mb-8">
                    <div class="flex items-center justify-center h-full opacity-30 tracking-[0.3em] font-black">Link Pending...</div>
                </div>
                <button id="btn-ai-analyze" onclick="fetchAI()" class="w-full btn-primary py-5 rounded-2xl font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all flex items-center justify-center">
                    <i data-lucide="brain-circuit" class="w-6 h-6 mr-3"></i> <span>Initiate Neural Scan</span>
                </button>
            </div>
        </div>

        <!-- TRENDS SECTION -->
        <div id="section-trends" class="hidden-section">
            <h2 class="text-4xl font-black mb-10 glow-text tracking-tighter uppercase italic">Web Trends</h2>
            <div id="trends-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <!-- Trends -->
                <div class="card p-12 text-center text-hint uppercase tracking-widest opacity-50 italic col-span-full">Initialize Global Search</div>
            </div>
            <button id="btn-trends" onclick="fetchTrends()" class="w-full btn-primary py-5 rounded-2xl font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all flex items-center justify-center">
                <i data-lucide="search" class="w-6 h-6 mr-3"></i> <span>Scan Internet</span>
            </button>
        </div>

        <!-- CHANNELS SECTION -->
        <div id="section-channels" class="hidden-section">
            <h2 class="text-4xl font-black mb-10 glow-text tracking-tighter uppercase italic">Network Management</h2>
            <div id="channels-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Channels -->
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden flex items-center justify-center p-4 z-50">
        <div class="card w-full max-w-2xl p-8 border-[#00fbff]/30">
            <h3 class="text-2xl font-black mb-6 glow-text uppercase tracking-widest italic">Modify Essence</h3>
            <textarea id="edit-text" class="w-full h-80 p-6 rounded-2xl mb-8 outline-none focus:border-[#00fbff] transition-all font-mono text-sm leading-relaxed" placeholder="Signals..."></textarea>
            <div class="flex space-x-4">
                <button onclick="saveEdit()" class="btn-primary flex-1 py-5 rounded-2xl font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Commit Changes</button>
                <button onclick="closeModal()" class="bg-transparent text-hint border border-[#30363d] flex-1 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-[#30363d] active:scale-95 transition-all">Discard</button>
            </div>
        </div>
    </div>

    <!-- Time Modal -->
    <div id="modal-time" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden flex items-center justify-center p-4 z-50">
        <div class="card w-full max-w-md p-8 border-[#00fbff]/30">
            <h3 class="text-2xl font-black mb-6 glow-text uppercase tracking-widest italic">Shift Time</h3>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="shiftTime(1)" class="bg-[#161b22] border border-[#30363d] py-4 rounded-xl font-bold">+1 Hour</button>
                <button onclick="shiftTime(4)" class="bg-[#161b22] border border-[#30363d] py-4 rounded-xl font-bold">+4 Hours</button>
                <button onclick="shiftTime(12)" class="bg-[#161b22] border border-[#30363d] py-4 rounded-xl font-bold">+12 Hours</button>
                <button onclick="shiftTime(24)" class="bg-[#161b22] border border-[#30363d] py-4 rounded-xl font-bold">+24 Hours</button>
            </div>
            <button onclick="closeTimeModal()" class="w-full bg-transparent text-hint border border-[#30363d] py-4 rounded-xl font-black uppercase">Cancel</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let currentPostId = null;
        let currentPostTime = null;
        let postDataCache = {};
        const API_URL = window.location.origin;

        function switchTab(tab) {
            document.getElementById('section-dashboard').classList.add('hidden-section');
            document.getElementById('section-channels').classList.add('hidden-section');
            document.getElementById('section-ai').classList.add('hidden-section');
            document.getElementById('section-trends').classList.add('hidden-section');
            
            ['dashboard', 'channels', 'ai', 'trends'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
                document.getElementById(`tab-${t}`).classList.add('text-hint');
            });
            
            document.getElementById(`section-${tab}`).classList.remove('hidden-section');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            document.getElementById(`tab-${tab}`).classList.remove('text-hint');
            
            if (tab === 'channels') fetchChannels();
            else if (tab === 'dashboard') fetchData();
        }

        async function fetchAI() {
            const btn = document.getElementById('btn-ai-analyze');
            const reportDiv = document.getElementById('ai-report');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="w-6 h-6 mr-3 animate-spin"></i> TRANSMITTING...';
            reportDiv.innerHTML = '<div class="flex items-center justify-center h-full opacity-50"><span class="animate-pulse tracking-[0.5em] font-black italic">SCANNING SECTOR...</span></div>';
            try {
                const res = await fetch(`${API_URL}/api/ai/analyze`);
                const data = await res.json();
                reportDiv.innerHTML = data.report.replace(/\n/g, '<br>');
            } catch (e) { reportDiv.innerHTML = '❌ Link Failed.'; } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="brain-circuit" class="w-6 h-6 mr-3"></i> <span>Initiate Neural Scan</span>';
                lucide.createIcons();
            }
        }

        async function fetchTrends() {
            const btn = document.getElementById('btn-trends');
            const list = document.getElementById('trends-list');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="w-6 h-6 mr-3 animate-spin"></i> SCANNING WEB...';
            try {
                const res = await fetch(`${API_URL}/api/trends`);
                const data = await res.json();
                list.innerHTML = data.trends.map(t => `
                    <div class="card p-6 flex flex-col border-[#30363d]">
                        <div class="flex items-center mb-4">
                            <i data-lucide="${t.source === 'YouTube' ? 'video' : 'package'}" class="w-5 h-5 mr-3 text-[#00fbff]"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest text-[#00fbff]">${t.source}</span>
                        </div>
                        <h4 class="text-sm font-bold mb-4 italic leading-snug">${t.title}</h4>
                        <a href="${t.url}" target="_blank" class="text-center bg-[#00fbff]/10 text-[#00fbff] py-3 rounded-xl text-[10px] font-black uppercase tracking-widest border border-[#00fbff]/20 hover:bg-[#00fbff]/20 transition-all">Open Link</a>
                    </div>
                `).join('');
            } catch (e) { list.innerHTML = '<div class="col-span-full text-center text-red-500">Scan Failed</div>'; } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="search" class="w-6 h-6 mr-3"></i> <span>Search Internet</span>';
                lucide.createIcons();
            }
        }

        async function fetchData() {
            try {
                const ts = Date.now();
                const statsRes = await fetch(`${API_URL}/api/stats?t=${ts}`);
                const stats = await statsRes.json();
                document.getElementById('stat-queue').innerText = stats.queue;
                document.getElementById('stat-today').innerText = stats.today;
                document.getElementById('stat-total').innerText = stats.total;
                document.getElementById('stat-channels').innerText = stats.channels || 0;
                const queueRes = await fetch(`${API_URL}/api/queue?t=${ts}`);
                const queue = await queueRes.json();
                renderQueue(queue);
            } catch (e) { console.error(e); }
        }

        async function fetchChannels() {
            try {
                const res = await fetch(`${API_URL}/api/channels`);
                const data = await res.json();
                renderChannels(data.channels, data.active);
            } catch (e) { console.error(e); }
        }

        function renderQueue(posts) {
            const list = document.getElementById('queue-list');
            if (!posts || posts.length === 0) {
                list.innerHTML = '<div class="col-span-full text-hint text-center py-24 bg-[#161b22] rounded-3xl border border-dashed border-[#30363d] uppercase tracking-[0.3em] opacity-50 italic">Empty Pipeline</div>';
                return;
            }
            postDataCache = {};
            list.innerHTML = posts.map(post => {
                postDataCache[post.id] = post.text;
                const date = new Date(post.scheduled_time * 1000).toLocaleString('ru-RU', {
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                });
                let attachmentsHtml = '';
                if (post.photo_id) {
                    const isAlbum = post.photo_id.includes(',');
                    attachmentsHtml += `<div class="bg-[#00fbff]/10 text-[#00fbff] p-3 rounded-xl flex items-center mb-4 border border-[#00fbff]/20"><i data-lucide="${isAlbum ? 'layers' : 'image'}" class="w-4 h-4 mr-2"></i><span class="text-[10px] font-black uppercase">${isAlbum ? 'Album' : 'Visual'}</span></div>`;
                }
                if (post.document_id) {
                    attachmentsHtml += `<div class="bg-amber-500/10 text-amber-500 p-3 rounded-xl flex items-center mb-4 border border-amber-500/20"><i data-lucide="file-text" class="w-4 h-4 mr-2"></i><span class="text-[10px] font-black uppercase">File</span></div>`;
                }
                return `
                    <div class="card overflow-hidden flex flex-col border-[#30363d]">
                        <div class="p-5 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117]/50">
                            <span class="text-[10px] font-black uppercase tracking-widest text-[#00fbff]">${post.channel}</span>
                            <button onclick="openTimeModal(${post.id}, ${post.scheduled_time})" class="text-[10px] font-mono text-[#00fbff] bg-[#161b22] px-3 py-1.5 rounded-lg border border-[#00fbff]/30">${date}</button>
                        </div>
                        <div class="p-8 flex-1">
                            ${attachmentsHtml}
                            <div class="text-sm opacity-90 font-sans text-gray-300 italic line-clamp-6">
                                ${post.text.replace(/<[^>]*>?/gm, '')}
                            </div>
                        </div>
                        <div class="p-5 bg-[#0d1117]/50 border-t border-[#30363d] flex space-x-4">
                            <button onclick="openEdit(${post.id})" class="flex-1 bg-[#161b22] border border-[#30363d] text-[#e6edf3] py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em]">Edit</button>
                            <button onclick="publishNow(${post.id})" class="flex-1 btn-publish py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] bg-white text-black">Publish</button>
                            <button onclick="deletePost(${post.id})" class="w-14 flex items-center justify-center bg-[#161b22] border border-red-900/30 text-red-500 rounded-2xl"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderChannels(channels, active) {
            const list = document.getElementById('channels-list');
            list.innerHTML = channels.map(ch => `
                <div class="card p-6 flex justify-between items-center ${ch === active ? 'border-[#00fbff] bg-[#00fbff]/5' : 'border-[#30363d]'}">
                    <span class="text-sm font-black uppercase tracking-widest ${ch === active ? 'text-[#00fbff]' : 'text-hint'}">${ch}</span>
                    ${ch !== active ? `
                        <button onclick="setActiveChannel('${ch}')" class="bg-[#161b22] border border-[#30363d] px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-[#00fbff]">Activate</button>
                    ` : '<i data-lucide="check-circle" class="text-[#00fbff] w-6 h-6"></i>'}
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function setActiveChannel(ch) {
            await fetch(`${API_URL}/api/channels/set?channel=${encodeURIComponent(ch)}`, {method: 'POST'});
            fetchChannels();
        }

        function openEdit(id) {
            currentPostId = id;
            document.getElementById('edit-text').value = postDataCache[id] || '';
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveEdit() {
            const newText = document.getElementById('edit-text').value;
            await fetch(`${API_URL}/api/queue/${currentPostId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: newText})
            });
            closeModal(); fetchData();
        }

        function openTimeModal(id, time) { currentPostId = id; currentPostTime = time; document.getElementById('modal-time').classList.remove('hidden'); }
        function closeTimeModal() { document.getElementById('modal-time').classList.add('hidden'); }
        async function shiftTime(hours) {
            const newTime = currentPostTime + (hours * 3600);
            await fetch(`${API_URL}/api/queue/${currentPostId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({scheduled_time: newTime})
            });
            closeTimeModal(); fetchData();
        }

        async function deletePost(id) { if (!confirm('EXTRACT?')) return; await fetch(`${API_URL}/api/queue/${id}`, {method: 'DELETE'}); fetchData(); }
        async function publishNow(id) { tg.MainButton.setText('TRANSMITTING...'); tg.MainButton.show(); await fetch(`${API_URL}/api/queue/${id}/publish`, {method: 'POST'}); tg.MainButton.hide(); fetchData(); }
        window.onload = () => { fetchData(); lucide.createIcons(); };
    </script>
</body>
</html>
