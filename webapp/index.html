<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mine Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sculk-dark: #0d1117; --sculk-glow: #00fbff; --sculk-secondary: #161b22; --sculk-text: #e6edf3; --sculk-hint: #7d8590; }
        body { background-color: var(--sculk-dark); color: var(--sculk-text); background-image: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        .card { background-color: var(--sculk-secondary); border: 1px solid rgba(0, 251, 255, 0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); transition: all 0.3s; }
        .card:hover { border-color: rgba(0, 251, 255, 0.4); transform: translateY(-4px); }
        .btn-primary { background: linear-gradient(135deg, #00fbff 0%, #008f91 100%); color: #000; box-shadow: 0 0 20px rgba(0, 251, 255, 0.3); }
        .glow-text { color: var(--sculk-glow); text-shadow: 0 0 15px rgba(0, 251, 255, 0.6); }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }
        .btn-publish { animation: pulse 2s infinite ease-in-out; }
        .tab-active { color: var(--sculk-glow); border-bottom: 3px solid var(--sculk-glow); }
        textarea, input { background-color: #0d1117 !important; color: white !important; border: 1px solid #30363d !important; }
        .hidden-section { display: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .chat-msg { margin-bottom: 15px; max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .msg-ai { background: rgba(0, 251, 255, 0.1); border: 1px solid rgba(0, 251, 255, 0.2); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-user { background: #30363d; align-self: flex-end; border-bottom-right-radius: 2px; }
    </style>
</head>
<body class="p-4 md:p-8 pb-24">
    <div id="app" class="max-w-5xl mx-auto">
        <nav class="flex justify-start md:justify-around mb-10 bg-black/30 backdrop-blur-md sticky top-0 z-40 p-2 rounded-2xl border border-white/5 overflow-x-auto nav-scroll">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] tab-active whitespace-nowrap">Studio</button>
            <button onclick="switchTab('ai')" id="tab-ai" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] text-hint whitespace-nowrap">AI Terminal</button>
            <button onclick="switchTab('cf')" id="tab-cf" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] text-hint whitespace-nowrap">Mod Finder</button>
            <button onclick="switchTab('trends')" id="tab-trends" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] text-hint whitespace-nowrap">Videos</button>
            <button onclick="switchTab('channels')" id="tab-channels" class="px-6 py-3 font-black uppercase tracking-widest text-[10px] text-hint whitespace-nowrap">Network</button>
        </nav>

        <!-- STUDIO -->
        <div id="section-dashboard">
            <header class="mb-12">
                <h1 class="text-5xl font-black mb-10 glow-text tracking-tighter uppercase italic">MINE STUDIO</h1>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8">
                    <div class="card p-6 flex flex-col items-center justify-center border-t-2 border-t-[#00fbff]"><span class="text-hint text-[10px] uppercase tracking-[0.3em] mb-2">Queue</span><span id="stat-queue" class="text-4xl font-black text-[#00fbff]">0</span></div>
                    <div class="card p-6 flex flex-col items-center justify-center border-t-2 border-t-[#00fbff]"><span class="text-hint text-[10px] uppercase tracking-[0.3em] mb-2">Today</span><span id="stat-today" class="text-4xl font-black text-[#00fbff]">0</span></div>
                    <div class="card p-6 flex flex-col items-center justify-center border-t-2 border-t-white/10"><span class="text-hint text-[10px] uppercase tracking-[0.3em] mb-2">Total</span><span id="stat-total" class="text-4xl font-black opacity-30">0</span></div>
                    <div class="card p-6 flex flex-col items-center justify-center border-t-2 border-t-white/10"><span class="text-hint text-[10px] uppercase tracking-[0.3em] mb-2">Active</span><span id="stat-channels" class="text-4xl font-black opacity-30">0</span></div>
                </div>
            </header>
            <section>
                <div class="flex justify-between items-center mb-8"><h2 class="text-3xl font-black uppercase italic opacity-80">Pipeline</h2><button onclick="fetchData()" class="bg-[#161b22] p-4 rounded-2xl text-[#00fbff] border border-[#30363d]"><i data-lucide="refresh-cw" class="w-6 h-6"></i></button></div>
                <div id="queue-list" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </section>
        </div>

        <!-- AI TERMINAL -->
        <div id="section-ai" class="hidden-section flex flex-col h-[70vh]">
            <div class="flex justify-between items-center mb-6"><h2 class="text-4xl font-black glow-text uppercase italic">AI Terminal</h2><button onclick="fetchAIAnalysis()" class="bg-[#00fbff]/10 text-[#00fbff] border border-[#00fbff]/30 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Analyze Comments</button></div>
            <div class="card flex-1 flex flex-col overflow-hidden border-[#00fbff]/20">
                <div id="chat-container" class="flex-1 overflow-y-auto p-6 flex flex-col"><div class="chat-msg msg-ai">System ready. Focus: Bedrock/PE. How can I assist you, Admin?</div></div>
                <div class="p-4 bg-black/20 border-t border-[#30363d] flex space-x-3">
                    <input type="text" id="chat-input" class="flex-1 bg-transparent border-none outline-none p-3 rounded-xl font-medium" placeholder="Transmit signal..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="btn-primary p-4 rounded-xl"><i data-lucide="send" class="w-5 h-5"></i></button>
                </div>
            </div>
        </div>

        <!-- MOD FINDER (CurseForge) -->
        <div id="section-cf" class="hidden-section">
            <h2 class="text-4xl font-black mb-10 glow-text uppercase italic">Mod Finder</h2>
            <div class="flex space-x-4 mb-10">
                <button onclick="fetchCF('popular')" class="flex-1 bg-[#161b22] border border-[#30363d] py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-[#00fbff] transition-all">🔥 Popular</button>
                <button onclick="fetchCF('new')" class="flex-1 bg-[#161b22] border border-[#30363d] py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-[#00fbff] transition-all">✨ Newest</button>
            </div>
            <div id="cf-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="card p-12 text-center text-hint uppercase tracking-widest opacity-50 italic col-span-full">Select Search Mode</div>
            </div>
        </div>

        <!-- TRENDS (YouTube) -->
        <div id="section-trends" class="hidden-section">
            <h2 class="text-4xl font-black mb-10 glow-text uppercase italic">Video Trends</h2>
            <div id="trends-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="card p-12 text-center text-hint uppercase tracking-widest opacity-50 italic col-span-full">Scan for Videos (No Shorts)</div>
            </div>
            <button id="btn-trends" onclick="fetchTrends()" class="w-full btn-primary py-5 rounded-2xl font-black uppercase tracking-widest shadow-2xl flex items-center justify-center">
                <i data-lucide="video" class="w-6 h-6 mr-3"></i> <span>Scan YouTube Bedrock</span>
            </button>
        </div>

        <!-- NETWORK -->
        <div id="section-channels" class="hidden-section"><h2 class="text-4xl font-black mb-10 glow-text uppercase italic">Network</h2><div id="channels-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div></div>
    </div>

    <!-- Edit Modal -->
    <div id="modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden flex items-center justify-center p-4 z-50">
        <div class="card w-full max-w-2xl p-8"><h3 class="text-2xl font-black mb-6 glow-text uppercase italic">Modify Essence</h3><textarea id="edit-text" class="w-full h-80 p-6 rounded-2xl mb-8 outline-none font-mono text-sm"></textarea><div class="flex space-x-4"><button onclick="saveEdit()" class="btn-primary flex-1 py-5 rounded-2xl font-black uppercase">Commit</button><button onclick="closeModal()" class="bg-transparent text-hint border border-[#30363d] flex-1 py-5 rounded-2xl font-black uppercase">Discard</button></div></div>
    </div>

    <div id="modal-time" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden flex items-center justify-center p-4 z-50">
        <div class="card w-full max-w-md p-8"><h3 class="text-2xl font-black mb-6 glow-text uppercase italic">Shift Time</h3><div class="grid grid-cols-2 gap-4 mb-8"><button onclick="shiftTime(1)" class="bg-[#161b22] border border-[#30363d] py-4 rounded-xl font-bold">+1h</button><button onclick="shiftTime(4)" class="bg-[#161b22] border border-[#30363d] py-4 rounded-xl font-bold">+4h</button><button onclick="shiftTime(12)" class="bg-[#161b22] border border-[#30363d] py-4 rounded-xl font-bold">+12h</button><button onclick="shiftTime(24)" class="bg-[#161b22] border border-[#30363d] py-4 rounded-xl font-bold">+24h</button></div><button onclick="closeTimeModal()" class="w-full bg-transparent text-hint border border-[#30363d] py-4 rounded-xl font-black uppercase">Cancel</button></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.enableClosingConfirmation();
        const API_URL = window.location.origin;
        let currentPostId = null, currentPostTime = null, postDataCache = {};

        function switchTab(tab) {
            ['dashboard', 'channels', 'ai', 'trends', 'cf'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden-section');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
                document.getElementById(`tab-${t}`).classList.add('text-hint');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden-section');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            document.getElementById(`tab-${tab}`).classList.remove('text-hint');
            if (tab === 'channels') fetchChannels(); else if (tab === 'dashboard') fetchData();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input'), container = document.getElementById('chat-container'), msg = input.value.trim();
            if (!msg) return; input.value = ''; container.innerHTML += `<div class="chat-msg msg-user">${msg}</div>`; container.scrollTop = container.scrollHeight;
            try {
                const res = await fetch(`${API_URL}/api/ai/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: msg, user_id: tg.initDataUnsafe.user?.id || 0, lang: 'uz'}) });
                const data = await res.json(); container.innerHTML += `<div class="chat-msg msg-ai">${data.response.replace(/\n/g, '<br>')}</div>`; container.scrollTop = container.scrollHeight;
            } catch (e) { container.innerHTML += `<div class="chat-msg msg-ai text-red-500">Error. Reconnecting...</div>`; }
            lucide.createIcons();
        }

        async function fetchAIAnalysis() {
            const container = document.getElementById('chat-container'); container.innerHTML += `<div class="chat-msg msg-ai italic animate-pulse">Running Neural Scan on comments...</div>`; container.scrollTop = container.scrollHeight;
            try {
                const res = await fetch(`${API_URL}/api/ai/analyze`); const data = await res.json();
                container.innerHTML += `<div class="chat-msg msg-ai">${data.report.replace(/\n/g, '<br>')}</div>`; container.scrollTop = container.scrollHeight;
            } catch (e) { container.innerHTML += `<div class="chat-msg msg-ai text-red-500">Scan failed.</div>`; }
            lucide.createIcons();
        }

        async function fetchTrends() {
            const btn = document.getElementById('btn-trends'), list = document.getElementById('trends-list');
            btn.disabled = true; btn.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin mr-3"></i> SCANNING...';
            try {
                const res = await fetch(`${API_URL}/api/trends`); const data = await res.json();
                list.innerHTML = data.trends.map(t => `
                    <div class="card p-6 flex flex-col border-[#30363d]">
                        <div class="flex justify-between items-start mb-4"><div class="flex items-center"><i data-lucide="video" class="w-4 h-4 mr-2 text-[#00fbff]"></i><span class="text-[10px] font-black uppercase text-[#00fbff]">YouTube Video</span></div><span class="bg-amber-500/20 text-amber-500 px-2 py-1 rounded text-[8px] font-black uppercase">${t.version}</span></div>
                        <h4 class="text-sm font-bold mb-4 italic line-clamp-2">${t.title}</h4>
                        <a href="${t.url}" target="_blank" class="text-center bg-[#00fbff]/10 text-[#00fbff] py-3 rounded-xl text-[10px] font-black uppercase border border-[#00fbff]/20">Watch Video</a>
                    </div>
                `).join('');
            } catch (e) { list.innerHTML = '<div class="col-span-full text-center text-red-500">Scan Failed</div>'; }
            finally { btn.disabled = false; btn.innerHTML = '<i data-lucide="video" class="mr-3"></i> <span>Scan YouTube Bedrock</span>'; lucide.createIcons(); }
        }

        async function fetchCF(sort) {
            const list = document.getElementById('cf-list');
            list.innerHTML = '<div class="col-span-full text-center py-12"><i data-lucide="refresh-cw" class="animate-spin w-8 h-8 mx-auto text-[#00fbff] mb-4"></i><div class="text-[10px] uppercase tracking-widest font-black opacity-50">Searching CurseForge...</div></div>';
            lucide.createIcons();
            try {
                const res = await fetch(`${API_URL}/api/cf/search?sort=${sort}`); const data = await res.json();
                list.innerHTML = data.mods.map(m => `
                    <div class="card p-6 flex flex-col border-[#30363d]">
                        <div class="flex justify-between items-start mb-4"><div class="flex items-center"><i data-lucide="package" class="w-4 h-4 mr-2 text-amber-500"></i><span class="text-[10px] font-black uppercase text-amber-500">CurseForge</span></div><span class="bg-[#00fbff]/20 text-[#00fbff] px-2 py-1 rounded text-[8px] font-black uppercase">${m.type}</span></div>
                        <h4 class="text-sm font-bold mb-4 italic line-clamp-2">${m.title}</h4>
                        <a href="${m.url}" target="_blank" class="text-center bg-amber-500/10 text-amber-500 py-3 rounded-xl text-[10px] font-black uppercase border border-amber-500/20">Open Project</a>
                    </div>
                `).join('');
            } catch (e) { list.innerHTML = '<div class="col-span-full text-center text-red-500">Scan Failed</div>'; }
            lucide.createIcons();
        }

        async function fetchData() {
            try {
                const ts = Date.now();
                const sR = await fetch(`${API_URL}/api/stats?t=${ts}`), s = await sR.json();
                document.getElementById('stat-queue').innerText = s.queue; document.getElementById('stat-today').innerText = s.today;
                document.getElementById('stat-total').innerText = s.total; document.getElementById('stat-channels').innerText = s.channels || 0;
                const qR = await fetch(`${API_URL}/api/queue?t=${ts}`), q = await qR.json(); renderQueue(q);
            } catch (e) {}
        }

        function renderQueue(posts) {
            const list = document.getElementById('queue-list'); if (!posts || posts.length === 0) { list.innerHTML = '<div class="col-span-full text-hint text-center py-24 bg-[#161b22] rounded-3xl border border-dashed border-[#30363d] uppercase tracking-[0.3em] opacity-50 italic">Empty Pipeline</div>'; return; }
            postDataCache = {}; list.innerHTML = posts.map(p => {
                postDataCache[p.id] = p.text; const d = new Date(p.scheduled_time * 1000).toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});

                // Формируем блок картинки
                let imageHtml = '';
                if (p.photo_id) {
                    const isAlbum = p.photo_id.includes(',');
                    imageHtml = `
                    <div class="relative w-full h-48 bg-black/20 overflow-hidden">
                        <img src="${API_URL}/api/image/${p.photo_id}" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity" alt="Mod Preview" onerror="this.src='https://placehold.co/600x400/161b22/00fbff?text=No+Image'">
                        ${isAlbum ? `<div class="absolute top-3 right-3 bg-black/60 backdrop-blur-md text-[8px] font-black px-2 py-1 rounded-lg border border-white/10 uppercase tracking-widest text-white">ALBUM</div>` : ''}
                        <div class="absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-[#0d1117] to-transparent"></div>
                    </div>
                    `;
                }

                // Индикатор файла
                const fileHtml = p.document_id ? 
                    `<div class="flex items-center space-x-2 bg-[#00fbff]/10 border border-[#00fbff]/20 px-3 py-1.5 rounded-xl">
                        <i data-lucide="file-check" class="w-3 h-3 text-[#00fbff]"></i>
                        <span class="text-[8px] font-black uppercase text-[#00fbff] tracking-widest">FILE READY</span>
                    </div>` : 
                    `<div class="flex items-center space-x-2 bg-red-500/10 border border-red-500/20 px-3 py-1.5 rounded-xl">
                        <i data-lucide="file-x" class="w-3 h-3 text-red-500"></i>
                        <span class="text-[8px] font-black uppercase text-red-500 tracking-widest">NO FILE</span>
                    </div>`;

                return `
                <div class="card overflow-hidden flex flex-col border-[#30363d] group">
                    <div class="p-5 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117]/50">
                        <span class="text-[10px] font-black uppercase text-[#00fbff] tracking-widest">${p.channel}</span>
                        <button onclick="openTimeModal(${p.id}, ${p.scheduled_time})" class="text-[10px] font-mono text-[#00fbff] bg-[#161b22] px-3 py-1.5 rounded-lg border border-[#00fbff]/30 hover:border-[#00fbff] transition-colors">${d}</button>
                    </div>

                    ${imageHtml}

                    <div class="p-6 flex-1 flex flex-col">
                        <div class="mb-4 flex">
                            ${fileHtml}
                        </div>
                        <div class="text-sm opacity-90 font-sans text-gray-300 italic line-clamp-4 leading-relaxed">${p.text.replace(/<[^>]*>?/gm, '')}</div>
                    </div>

                    <div class="p-5 bg-[#0d1117]/50 border-t border-[#30363d] flex space-x-4">
                        <button onclick="openEdit(${p.id})" class="flex-1 bg-[#161b22] border border-[#30363d] text-[#e6edf3] py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-[#1c2128] transition-colors">Edit</button>
                        <button onclick="publishNow(${p.id})" class="flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-white text-black hover:bg-gray-200 transition-colors">Publish</button>
                        <button onclick="deletePost(${p.id})" class="w-14 flex items-center justify-center bg-[#161b22] border border-red-900/30 text-red-500 rounded-2xl hover:bg-red-500/10 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>`;
            }).join(''); lucide.createIcons();
        }
        async function fetchChannels() {
            try {
                const res = await fetch(`${API_URL}/api/channels`), data = await res.json();
                document.getElementById('channels-list').innerHTML = data.channels.map(ch => `<div class="card p-6 flex justify-between items-center ${ch===data.active?'border-[#00fbff] bg-[#00fbff]/5':'border-[#30363d]'}"><span class="text-sm font-black uppercase tracking-widest ${ch===data.active?'text-[#00fbff]':'text-hint'}">${ch}</span>${ch!==data.active?`<button onclick="setActiveChannel('${ch}')" class="bg-[#161b22] border border-[#30363d] px-4 py-2 rounded-xl text-[10px] font-black text-[#00fbff]">Activate</button>`:'<i data-lucide="check-circle" class="text-[#00fbff] w-6 h-6"></i>'}</div>`).join('');
                lucide.createIcons();
            } catch (e) {}
        }

        async function setActiveChannel(ch) { await fetch(`${API_URL}/api/channels/set?channel=${encodeURIComponent(ch)}`, {method: 'POST'}); fetchChannels(); }
        function openEdit(id) { currentPostId = id; document.getElementById('edit-text').value = postDataCache[id] || ''; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        async function saveEdit() { const newText = document.getElementById('edit-text').value; await fetch(`${API_URL}/api/queue/${currentPostId}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: newText}) }); closeModal(); fetchData(); }
        function openTimeModal(id, time) { currentPostId = id; currentPostTime = time; document.getElementById('modal-time').classList.remove('hidden'); }
        function closeTimeModal() { document.getElementById('modal-time').classList.add('hidden'); }
        async function shiftTime(hours) { const newTime = currentPostTime + (hours * 3600); await fetch(`${API_URL}/api/queue/${currentPostId}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({scheduled_time: newTime}) }); closeTimeModal(); fetchData(); }
        async function deletePost(id) { if (!confirm('EXTRACT?')) return; await fetch(`${API_URL}/api/queue/${id}`, {method: 'DELETE'}); fetchData(); }
        async function publishNow(id) { tg.MainButton.setText('TRANSMITTING...'); tg.MainButton.show(); await fetch(`${API_URL}/api/queue/${id}/publish`, {method: 'POST'}); tg.MainButton.hide(); fetchData(); }
        window.onload = () => { fetchData(); lucide.createIcons(); };
    </script>
</body>
</html>
